<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Felipe Akel Carvalho Florentino">
    <meta name="descrition" content="Capítulo 6 - Exemplos 1 - Página 130">

    <link rel="icon" type="image/x-icon" href="/img/java-script.ico">
    <link rel="stylesheet" href="../css/bootstrap.css">

    <title>Capítulo 6 - Exemplos 1 - Página 130</title>
</head>

<body>
    <div class="container">
        <h1>Capítulo 6
            <small class="text-body-secondary">Exemplos 1 - Página 130</small>
        </h1>

        <h3 class="mt-4">Consultório Odontológico</h3>

        <div class="row mb-3 ">
            <div class="col-4 themed-grid-col">
                <figure class="figure">
                    <img src="img/ex6_1.jpg" class="figure-img img-fluid rounded" alt="Imagem Ilustrativa Exemplo">
                    <figcaption class="figure-caption">Imagem Ilustrativa Exemplo</figcaption>
                </figure>
            </div>
            <div class="col-4 themed-grid-col">
                
                <form>
                    <div class="mb-3">
                        <label for="inPaciente" class="form-label">Paciente:</label>
                        <input type="text" class="form-control" name="inPaciente" id="inPaciente" required autofocus>
                    </div>

                    <button type="submit" class="btn btn-primary">Adicionar</button>
                    <button type="button" class="btn btn-danger" id="btnUrgencia" >Urgência</button>
                    <button type="button" class="btn btn-success" id="btnAtender" >Atender</button>
                </form>

            </div>
            <div class="col-4 themed-grid-col"></div>
        </div>

        <h3 class="mt-4">Em Atendimento: <span class="text-primary" id="outAtendimento"></span> </h3>
        <h3 class="mt-4">Resultado(s)</h3>
        <pre id="outListaPacientes" ></pre>
    </div>

    <script src="js/ex6_1.js"></script>

</body>
</html>
